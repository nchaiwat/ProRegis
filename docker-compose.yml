
services:
  # 1. PostgreSQL Database Container
  postgres:
    image: postgres:15-alpine
    container_name: proregis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: proregis
    ports:
      - "5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 2. NestJS Backend API Container
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: proregis-api
    restart: always
    env_file:
      - ./api/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgrespassword
      - DB_DATABASE=proregis
      # TELEGRAM CONFIGURATION - Updated on 2026-07-03T21:42:00
      - TELEGRAM_API_BASE_URL=https://api.telegram.org
      - TELEGRAM_BOT_TOKEN=8231754616:AAHcITgZR6_Gc8XJx-6Fxj-Cyy5bZZQG2hw
      - TELEGRAM_GROUP_ID=-5394050672
      # SAP B1 CONFIGURATION - Updated on 2026-07-03T21:42:00
      - SAP_SERVICE_LAYER_URL=http://wa-dbs2.wa.net:50002/b1s/v2
      - SAP_COMPANY_DB=SBO_WA_Test_20260531
      - SAP_USERNAME=Chaiwat.N
      - SAP_PASSWORD=Ojmcpnna2!
      - SAP_REJECT_UNAUTHORIZED=false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.proregis-api.rule=Host(`proregis.windowasia.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.proregis-api.entrypoints=websecure"
      - "traefik.http.routers.proregis-api.tls=true"
      - "traefik.http.routers.proregis-api.tls.certresolver=mytlschallenge"
      - "traefik.http.middlewares.proregis-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.proregis-api.middlewares=proregis-strip"
      - "traefik.http.services.proregis-api.loadbalancer.server.port=3001"
      - "traefik.docker.network=root_default"
    networks:
      - default
      - root_default
    depends_on:
      - postgres

  # 3. Next.js Web Frontend Container
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: proregis-web
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.proregis-web.rule=Host(`proregis.windowasia.com`)"
      - "traefik.http.routers.proregis-web.entrypoints=websecure"
      - "traefik.http.routers.proregis-web.tls=true"
      - "traefik.http.routers.proregis-web.tls.certresolver=mytlschallenge"
      - "traefik.http.services.proregis-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=root_default"
    networks:
      - default
      - root_default
    depends_on:
      - api

networks:
  default:
  root_default:
    external: true
    name: root_default

volumes:
  pgdata:

