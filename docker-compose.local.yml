version: '3.8'

services:
  # 1. Database
  postgres:
    image: postgres:15-alpine
    container_name: proregis-postgres-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: proregis
    ports:
      - "5439:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    restart: always

  # 2. NestJS Backend API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: proregis-api-local
    ports:
      - "3001:3001"
    env_file:
      - ./api/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgrespassword
      - DB_DATABASE=proregis
      # TELEGRAM CONFIGURATION - Updated on 2026-07-03T21:42:00
      - TELEGRAM_API_BASE_URL=https://api.telegram.org
      - TELEGRAM_BOT_TOKEN=8231754616:AAHcITgZR6_Gc8XJx-6Fxj-Cyy5bZZQG2hw
      - TELEGRAM_GROUP_ID=-5394050672
      # SAP B1 CONFIGURATION - Updated on 2026-07-03T21:42:00
      - SAP_SERVICE_LAYER_URL=http://wa-dbs2.wa.net:50002/b1s/v2
      - SAP_COMPANY_DB=SBO_WA_Test_20260531
      - SAP_USERNAME=Chaiwat.N
      - SAP_PASSWORD=Ojmcpnna2!
      - SAP_REJECT_UNAUTHORIZED=false
    depends_on:
      - postgres
    restart: always

  # 3. Next.js Web Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: proregis-web-local
    depends_on:
      - api
    restart: always

  # 4. Nginx Reverse Proxy (SSL port 443 & HTTP port 80)
  nginx:
    image: nginx:alpine
    container_name: proregis-nginx-local
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ./web/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api
    restart: always

volumes:
  pgdata_local:
